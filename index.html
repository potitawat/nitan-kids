<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นิทานแสนสนุก | Story Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Baloo+2:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8EC; --card:#FFFFFF; --ink:#4A3A2A; --accent:#FF8A5C;
    --accent2:#5CBFA5; --accent3:#F7C948; --soft:#FFE8D6; --shadow:0 6px 20px rgba(120,80,40,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Mali','Baloo 2',cursive,sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh;
  }
  /* ---------- header ---------- */
  header{
    background:linear-gradient(135deg,#FFB88C 0%,#FF8A5C 60%,#F76B4A 100%);
    padding:22px 20px 60px; text-align:center; position:relative; overflow:hidden;
  }
  header .clouds{position:absolute;inset:0;pointer-events:none;opacity:.35}
  header h1{color:#fff;font-size:clamp(1.6rem,4.5vw,2.6rem);font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,.15);position:relative}
  header p{color:#FFF3E4;margin-top:6px;font-size:clamp(.9rem,2.5vw,1.1rem);position:relative}
  .lang-toggle{
    position:absolute;top:16px;right:16px;display:flex;background:rgba(255,255,255,.25);
    border-radius:999px;padding:4px;z-index:5;
  }
  .lang-toggle button{
    border:none;background:transparent;color:#fff;font-family:inherit;font-weight:600;
    padding:6px 16px;border-radius:999px;cursor:pointer;font-size:.95rem;transition:.2s;
  }
  .lang-toggle button.active{background:#fff;color:var(--accent)}
  /* ---------- filter ---------- */
  .filters{
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
    margin:-30px auto 26px;position:relative;z-index:4;padding:0 16px;
  }
  .filters button{
    font-family:inherit;font-size:1rem;font-weight:600;color:var(--ink);
    background:var(--card);border:3px solid transparent;border-radius:999px;
    padding:10px 22px;cursor:pointer;box-shadow:var(--shadow);transition:.2s;
  }
  .filters button:hover{transform:translateY(-2px)}
  .filters button.active{border-color:var(--accent);color:var(--accent)}
  /* ---------- library grid ---------- */
  .grid{
    max-width:1080px;margin:0 auto;padding:0 20px 60px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:24px;
  }
  .story-card{
    background:var(--card);border-radius:22px;overflow:hidden;cursor:pointer;
    box-shadow:var(--shadow);transition:.25s;border:3px solid transparent;
  }
  .story-card:hover{transform:translateY(-6px) rotate(-.5deg);border-color:var(--accent3)}
  .story-card .cover{aspect-ratio:8/5;background:var(--soft)}
  .story-card .cover svg{width:100%;height:100%;display:block}
  .story-card .info{padding:14px 16px 18px}
  .story-card h3{font-size:1.15rem;line-height:1.4}
  .story-card .meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .badge{
    font-size:.78rem;font-weight:600;padding:3px 12px;border-radius:999px;
    background:var(--soft);color:#C05621;
  }
  .badge.age{background:#DFF5EE;color:#1E7A62}
  .empty{grid-column:1/-1;text-align:center;padding:60px 0;font-size:1.1rem;opacity:.6}
  /* ---------- reader ---------- */
  .reader{
    position:fixed;inset:0;background:var(--bg);z-index:50;display:none;
    flex-direction:column;overflow:hidden;
  }
  .reader.open{display:flex}
  .reader-top{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 16px;background:#fff;box-shadow:0 2px 10px rgba(120,80,40,.08);
  }
  .reader-top h2{font-size:clamp(1rem,3vw,1.3rem);flex:1;text-align:center}
  .btn-round{
    border:none;background:var(--soft);color:#C05621;font-family:inherit;font-weight:700;
    width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:1.2rem;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;transition:.2s;
  }
  .btn-round:hover{background:var(--accent);color:#fff}
  .page-area{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    overflow-y:auto;padding:20px 16px 90px;
  }
  .page-illust{
    width:min(720px,100%);background:#fff;border-radius:24px;overflow:hidden;
    box-shadow:var(--shadow);flex-shrink:0;
  }
  .page-illust svg{width:100%;height:auto;display:block}
  .page-text{
    width:min(720px,100%);margin-top:18px;font-size:clamp(1.05rem,3vw,1.35rem);
    line-height:1.9;text-align:center;padding:0 8px;
  }
  .reader-nav{
    position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;
    justify-content:space-between;padding:12px 20px;background:#fff;
    box-shadow:0 -2px 12px rgba(120,80,40,.1);z-index:55;
  }
  .nav-btn{
    font-family:inherit;font-size:1.05rem;font-weight:700;border:none;cursor:pointer;
    background:var(--accent);color:#fff;padding:10px 26px;border-radius:999px;transition:.2s;
  }
  .nav-btn:hover{background:#F76B4A;transform:scale(1.05)}
  .nav-btn:disabled{background:#E8DCCB;color:#B0A18C;cursor:default;transform:none}
  .page-dots{font-weight:600;color:#B0855C;font-size:.95rem}
  footer{text-align:center;padding:24px;font-size:.9rem;opacity:.55}
  @media (max-width:520px){
    .lang-toggle{top:10px;right:10px}
    header{padding-top:56px}
  }
</style>
</head>
<body>

<header>
  <svg class="clouds" viewBox="0 0 800 200" preserveAspectRatio="xMidYMid slice">
    <ellipse cx="120" cy="60" rx="70" ry="26" fill="#fff"/>
    <ellipse cx="180" cy="50" rx="50" ry="20" fill="#fff"/>
    <ellipse cx="640" cy="120" rx="80" ry="28" fill="#fff"/>
    <ellipse cx="700" cy="108" rx="50" ry="20" fill="#fff"/>
    <circle cx="420" cy="40" r="4" fill="#fff"/><circle cx="500" cy="90" r="3" fill="#fff"/>
    <circle cx="300" cy="110" r="3.5" fill="#fff"/>
  </svg>
  <div class="lang-toggle">
    <button id="btn-th" class="active" onclick="setLang('th')">ไทย</button>
    <button id="btn-en" onclick="setLang('en')">EN</button>
  </div>
  <h1 id="site-title">📚 นิทานแสนสนุก</h1>
  <p id="site-sub">เลือกนิทานที่ชอบ แล้วมาอ่านไปด้วยกันนะ!</p>
</header>

<div class="filters" id="filters"></div>
<main class="grid" id="grid"></main>

<footer id="footer">สร้างด้วยความรัก สำหรับนักอ่านตัวน้อยทุกคน 💛</footer>

<!-- ================= READER ================= -->
<div class="reader" id="reader">
  <div class="reader-top">
    <button class="btn-round" onclick="closeReader()" title="กลับ">←</button>
    <h2 id="reader-title"></h2>
    <button class="btn-round" onclick="toggleReaderLang()" id="reader-lang" title="สลับภาษา">EN</button>
  </div>
  <div class="page-area">
    <div class="page-illust" id="page-illust"></div>
    <div class="page-text" id="page-text"></div>
  </div>
  <div class="reader-nav">
    <button class="nav-btn" id="btn-prev" onclick="turnPage(-1)">◀ <span data-ui="prev">ก่อนหน้า</span></button>
    <span class="page-dots" id="page-dots"></span>
    <button class="nav-btn" id="btn-next" onclick="turnPage(1)"><span data-ui="next">ถัดไป</span> ▶</button>
  </div>
</div>

<script src="stories.js"></script>
<script>
const UI = {
  th:{title:'📚 นิทานแสนสนุก', sub:'เลือกนิทานที่ชอบ แล้วมาอ่านไปด้วยกันนะ!',
      all:'ทั้งหมด', age36:'อายุ 3–6 ปี', age69:'อายุ 6–9 ปี',
      prev:'ก่อนหน้า', next:'ถัดไป', end:'จบแล้ว 🎉', empty:'ยังไม่มีนิทานในหมวดนี้',
      footer:'สร้างด้วยความรัก สำหรับนักอ่านตัวน้อยทุกคน 💛', pages:'หน้า'},
  en:{title:'📚 Story Time', sub:'Pick a story you love and read along!',
      all:'All', age36:'Ages 3–6', age69:'Ages 6–9',
      prev:'Back', next:'Next', end:'The End 🎉', empty:'No stories in this group yet',
      footer:'Made with love, for every little reader 💛', pages:'pages'},
};
let lang = 'th';
let filter = 'all';
let current = null, pageIdx = 0;

function setLang(l){
  lang = l;
  document.getElementById('btn-th').classList.toggle('active', l==='th');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  render();
  if(current) renderPage();
}
function setFilter(f){ filter = f; render(); }

function render(){
  const t = UI[lang];
  document.getElementById('site-title').textContent = t.title;
  document.getElementById('site-sub').textContent = t.sub;
  document.getElementById('footer').textContent = t.footer;
  // filters
  const fdefs = [['all',t.all],['3-6',t.age36],['6-9',t.age69]];
  document.getElementById('filters').innerHTML = fdefs.map(([k,label])=>
    `<button class="${filter===k?'active':''}" onclick="setFilter('${k}')">${label}</button>`).join('');
  // grid
  const list = STORIES.filter(s => filter==='all' || s.age===filter);
  const grid = document.getElementById('grid');
  if(!list.length){ grid.innerHTML = `<div class="empty">${t.empty}</div>`; return; }
  grid.innerHTML = list.map(s => `
    <div class="story-card" onclick="openStory('${s.id}')">
      <div class="cover">${s.pages[0].svg}</div>
      <div class="info">
        <h3>${s.title[lang]}</h3>
        <div class="meta">
          <span class="badge age">${s.age==='3-6'?t.age36:t.age69}</span>
          <span class="badge">${s.pages.length} ${t.pages}</span>
        </div>
      </div>
    </div>`).join('');
}

function openStory(id){
  current = STORIES.find(s=>s.id===id);
  pageIdx = 0;
  document.getElementById('reader').classList.add('open');
  document.body.style.overflow='hidden';
  renderPage();
}
function closeReader(){
  current = null;
  document.getElementById('reader').classList.remove('open');
  document.body.style.overflow='';
}
function toggleReaderLang(){ setLang(lang==='th'?'en':'th'); }
function renderPage(){
  const t = UI[lang];
  const p = current.pages[pageIdx];
  document.getElementById('reader-title').textContent = current.title[lang];
  document.getElementById('reader-lang').textContent = lang==='th'?'EN':'ไทย';
  document.getElementById('page-illust').innerHTML = p.svg;
  document.getElementById('page-text').textContent = p[lang];
  document.getElementById('page-dots').textContent = `${pageIdx+1} / ${current.pages.length}`;
  document.getElementById('btn-prev').disabled = pageIdx===0;
  const nextBtn = document.getElementById('btn-next');
  if(pageIdx === current.pages.length-1){
    nextBtn.innerHTML = t.end;
    nextBtn.onclick = closeReader;
  } else {
    nextBtn.innerHTML = `${t.next} ▶`;
    nextBtn.onclick = ()=>turnPage(1);
  }
  document.getElementById('btn-prev').innerHTML = `◀ ${t.prev}`;
  document.querySelector('.page-area').scrollTop = 0;
}
function turnPage(d){
  pageIdx = Math.max(0, Math.min(current.pages.length-1, pageIdx+d));
  renderPage();
}
document.addEventListener('keydown', e=>{
  if(!current) return;
  if(e.key==='ArrowRight') turnPage(1);
  if(e.key==='ArrowLeft') turnPage(-1);
  if(e.key==='Escape') closeReader();
});
render();
</script>
</body>
</html>
